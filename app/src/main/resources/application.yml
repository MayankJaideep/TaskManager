spring:
  application:
    name: ai-order-manager
  ai:
    google:
      genai:
        api-key: ${GOOGLE_GENAI_API_KEY:YOUR_GEMINI_API_KEY}
        chat:
          options:
            model: gemini-1.5-flash
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8080
