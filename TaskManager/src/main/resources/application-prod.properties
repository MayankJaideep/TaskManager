# Production configuration
server.port=8080
logging.level.root=WARN
logging.level.com.Mayank.TaskManager=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/taskmanager.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=1GB

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/taskmanager}

# JWT
spring.app.jwtSecret=${JWT_SECRET:mySecretKey}
spring.app.jwtExpirationMs=1800000

# Cache
spring.cache.type=simple
spring.cache.cache-names=tasks

# CORS
spring.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3002,https://your-production-domain.com}
spring.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cors.allowed-headers=*
spring.cors.allow-credentials=true
